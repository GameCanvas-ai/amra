<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Amra — A World Compendium</title>
  <meta name="description" content="Amra is a fantasy world compendium for readers, dungeon masters, and worldbuilders. Seven chapters and seventeen mapped realms, available offline on iPhone and iPad.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230e0f12'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #0e0f12;
      --surface: #16181d;
      --text: #efe9d8;
      --muted: #9aa3b2;
      --faint: #5b6373;
      --dener: #b8c4dc;
      --iothas: #d87070;
      --hairline: rgba(184, 196, 220, 0.18);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      font-size: 17px;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: clamp(48px, 10vw, 96px) clamp(24px, 6vw, 48px) 96px;
    }
    .kicker {
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--dener);
      margin: 0 0 16px;
    }
    h1 {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      font-weight: 700;
      font-size: clamp(40px, 7vw, 56px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 0 0 24px;
      color: var(--text);
    }
    .lede {
      font-size: 19px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0 0 40px;
      max-width: 60ch;
    }
    .rule {
      width: 56px;
      height: 1px;
      background: var(--iothas);
      border: 0;
      margin: 0 0 40px;
    }
    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    nav a {
      display: inline-block;
      color: var(--text);
      text-decoration: none;
      font-size: 17px;
      padding: 14px 24px;
      border: 1px solid var(--hairline);
      border-radius: 999px;
      background: var(--surface);
      transition: border-color 120ms ease, color 120ms ease;
    }
    nav a:hover {
      border-color: var(--iothas);
      color: var(--text);
    }
    nav a::after {
      content: " →";
      color: var(--muted);
    }
    footer {
      margin-top: 96px;
      padding-top: 24px;
      border-top: 1px solid var(--hairline);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--faint);
    }
  </style>
</head>
<body>
  <main>
    <p class="kicker">A World Compendium</p>
    <h1>Amra</h1>
    <p class="lede">A fantasy world compendium for readers, dungeon masters, and worldbuilders. Seven chapters, seventeen mapped realms, and a long memory of fire — available offline on iPhone and iPad.</p>
    <hr class="rule">
    <nav>
      <ul>
        <li><a href="./privacy/">Privacy Policy</a></li>
        <li><a href="./support/">Support</a></li>
      </ul>
    </nav>
    <footer>© 2026 Carlos Donderis</footer>
  </main>
</body>
</html>
